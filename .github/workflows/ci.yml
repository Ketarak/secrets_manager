name: Continuous Integration

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsodium-dev valgrind build-essential pkg-config

      - name: Build project
        run: make clean && make

      - name: Build with AddressSanitizer and UndefinedBehaviorSanitizer
        run: make sanitize

      - name: Run unit and integration tests
        run: make test

      - name: Run memory leak checks with Valgrind
        run: |
          # Build test executable for Valgrind (without ASan, which conflicts with Valgrind)
          make clean && make
          gcc -Wall -Wextra -Wpedantic -O2 -g tests/test_crypto.c src/crypto.c -o test_crypto -lsodium
          valgrind --leak-check=full --show-leak-kinds=all --error-exitcode=1 ./test_crypto
